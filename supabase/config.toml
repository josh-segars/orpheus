# Supabase local-development configuration for Orpheus Social.
#
# This file is committed. Secrets are NEVER committed — the
# [auth.external.linkedin_oidc] block pulls client_id and secret from
# env vars that live in your shell profile or a dotenv loader.
#
# After editing this file, run `supabase stop && supabase start` to apply.
# Docs: https://supabase.com/docs/guides/cli/config

# Project identifier — appears in the Studio UI and local container names.
# Pick something short that won't collide with other Supabase projects
# running on the same machine.
project_id = "orpheus"

[api]
enabled = true
# Port the local PostgREST API listens on. If 54321 is in use on your
# machine, change both this value and the LinkedIn dev app callback URL.
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Inbucket is Supabase's local email sandbox — we don't send mail in the
# auth flow (LinkedIn handles verification), so this stays on default.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Matches the `site_url` set in the production Supabase dashboard.
# For local dev we point at the Vite dev server.
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

# Email confirmation is OFF. LinkedIn OIDC provides `email_verified`
# directly; the `on_auth_user_created` trigger enforces the gate.
# See Decision: LinkedIn Auth (2026-04-21) — ORPHEUS-23.
[auth.email]
enable_signup = false
double_confirm_changes = false
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

# ---------------------------------------------------------------------------
# LinkedIn (OIDC) provider — the only external provider in this phase.
# Required env vars (set in your shell or via direnv):
#
#   SUPABASE_AUTH_EXTERNAL_LINKEDIN_OIDC_CLIENT_ID
#   SUPABASE_AUTH_EXTERNAL_LINKEDIN_OIDC_SECRET
#
# Values come from the LinkedIn Developer app created for local dev
# (ORPHEUS-24). Callback URL registered on that LinkedIn app MUST be:
#   http://127.0.0.1:54321/auth/v1/callback
# ---------------------------------------------------------------------------
[auth.external.linkedin_oidc]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_LINKEDIN_OIDC_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_LINKEDIN_OIDC_SECRET)"
# Supabase ships a default redirect_uri that matches api.port above;
# leave commented unless the port is customized.
# redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
